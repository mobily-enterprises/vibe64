name: Publish toolchain images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-toolchain-images.yml
      - tooling/studio-setup/Dockerfile
      - tooling/adapters/**/Dockerfile

permissions:
  contents: read
  packages: write

env:
  IMAGE_VERSION: 0.1.1
  REGISTRY: ghcr.io

jobs:
  base-toolchain:
    name: Base toolchain
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish base toolchain
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tooling/studio-setup/Dockerfile
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.opencontainers.image.title=vibe64-base-toolchain
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe64-base-toolchain:${{ env.IMAGE_VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe64-base-toolchain:sha-${{ github.sha }}

  adapter-toolchains:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs:
      - base-toolchain

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: JSKIT toolchain
            image: vibe64-jskit-toolchain
            dockerfile: tooling/adapters/jskit/Dockerfile
          - label: Laravel toolchain
            image: vibe64-laravel-toolchain
            dockerfile: tooling/adapters/laravel/Dockerfile
          - label: C++ toolchain
            image: vibe64-cpp-toolchain
            dockerfile: tooling/adapters/cpp/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish adapter toolchain
        uses: docker/build-push-action@v6
        with:
          build-args: |
            VIBE64_BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe64-base-toolchain:${{ env.IMAGE_VERSION }}
          context: .
          file: ${{ matrix.dockerfile }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_VERSION }}
            org.opencontainers.image.title=${{ matrix.image }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ env.IMAGE_VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:sha-${{ github.sha }}
