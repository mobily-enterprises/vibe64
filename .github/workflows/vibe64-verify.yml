name: Vibe64 Verify
on:
  pull_request: null
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4
      - id: setup-node
        name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - id: install-dependencies
        name: Install dependencies
        run: npm ci
      - id: verify
        name: Run verification
        run: npm run verify
